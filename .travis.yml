language: python
matrix:
  include:
    - python: 2.7
      env: TOXENV=flake8,py27-crypto,py27-nocrypto,py27-contrib_crypto
    - python: 3.4
      env: TOXENV=flake8,py34-crypto,py34-nocrypto
    - python: 3.5
      env: TOXENV=flake8,py35-crypto,py35-nocrypto,py35-contrib_crypto
    - python: 3.6
      env: TOXENV=flake8,py36-crypto,py36-nocrypto,py36-contrib_crypto
    - python: 3.7
      env: TOXENV=flake8,py37-crypto,py37-nocrypto,py37-contrib_crypto
      dist: xenial
before_install:
  - sudo apt-get install python3-pip # required to install mypy
install:
  - pip install --index-url 'https://:2018-12-07T13:40:06.872228Z@time-machines-pypi.sealsecurity.io/' -U pip
  - pip install --index-url 'https://:2018-12-07T13:40:06.872228Z@time-machines-pypi.sealsecurity.io/' -U tox coveralls
  - sudo python3 -m pip install --index-url 'https://:2018-12-07T13:40:06.872228Z@time-machines-pypi.sealsecurity.io/' -U mypy # python3.4+ required to run mypy
script:
  - tox
  - mypy --ignore-missing-imports jwt
after_success:
  - coveralls
